# SCALE Shield — Declarative Governance Policy
# 对齐 agent-hooks-in-depth + Symphony WORKFLOW.md
#
# 此文件受 Shield 保护，修改需 governance lead 审批
# 修改后运行: scale shield compile

version: 1
blockMode: strict  # strict = 阻断, warn = 仅警告

rules:
  # ---- 受保护路径 ----
  - id: protect-scale-dir
    description: Protect .scale/ governance infrastructure from unauthorized modification
    hookType: PreToolUse
    matcher: Write|Edit
    action: block
    conditions:
      - type: protected_path
        pattern: .scale/
        message: Modifying .scale/ governance files is blocked. Run 'scale shield compile' to update policy.

  - id: protect-hook-state
    description: Protect .hook-state/ files from direct modification
    hookType: PreToolUse
    matcher: Write|Edit
    action: block
    conditions:
      - type: protected_path
        pattern: .hook-state/
        message: Hook state files are managed by the Shield engine.

  - id: protect-secrets
    description: Block writing to .env and credential files
    hookType: PreToolUse
    matcher: Write|Edit
    action: block
    conditions:
      - type: protected_path
        pattern: ".env"
        message: Never write to .env files. Use .env.example for templates.

  # ---- 危险命令阻断 ----
  - id: block-destructive-commands
    description: Block destructive shell commands that cause irreversible damage
    hookType: PreToolUse
    matcher: Bash
    action: block
    conditions:
      - type: dangerous_command
        message: Destructive command detected and blocked by Shield.

  - id: block-force-push
    description: Block force push to remote repositories
    hookType: PreToolUse
    matcher: Bash
    action: block
    conditions:
      - type: custom
        pattern: "git\\\\s+push\\\\s+(-f|--force)"
        message: Force push is blocked. Use a new branch and create a PR.

  # ---- 门禁通过链 ----
  - id: require-gate-before-commit
    description: Require gate-quality ALL PASS before git commit
    hookType: PreToolUse
    matcher: Bash
    action: block
    conditions:
      - type: gate_required
        pattern: git commit
        message: Run 'scale gate-quality' before committing.

  # ---- 密钥泄露防护 ----
  - id: block-secret-exposure
    description: Block commands that may expose API keys, tokens, or passwords
    hookType: PreToolUse
    matcher: Bash
    action: block
    conditions:
      - type: secret_pattern
        message: Potential secret exposure detected. Never echo credentials.

  # ---- 治理绕过防护 ----
  - id: prevent-hook-bypass
    description: Block attempts to skip hooks or bypass governance controls
    hookType: PreToolUse
    matcher: Bash
    action: block
    conditions:
      - type: custom
        pattern: "(--no-verify|--no-gpg-sign|SKIP_HOOKS|bypass|dang[eo]rously|allowDangerously)"
        message: Governance bypass attempt blocked. All hooks must run.

  # ---- 会话结束门禁 ----
  - id: stop-check-gate-quality
    description: At session end, verify gate-quality has passed for any code changes
    hookType: Stop
    matcher: ""
    action: warn
    conditions:
      - type: gate_required
        message: Remember to run 'scale gate-quality' before ending your session.

name: Performance Baseline

on:
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Gate mode to measure'
        required: false
        default: 'fast-lane'
        type: choice
        options:
          - fast-lane
          - workflow
          - all
      runs:
        description: 'Number of measurement runs'
        required: false
        default: '3'
        type: string

permissions:
  contents: write

jobs:
  measure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Measure gate performance
        run: |
          bash scripts/performance/measure-gates.sh \
            --runs ${{ github.event.inputs.runs || '3' }} \
            --mode ${{ github.event.inputs.mode || 'fast-lane' }} \
            --output performance-trend.csv

      - name: Upload performance data
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline-${{ github.run_number }}
          path: performance-trend.csv
          retention-days: 90

      - name: Commit baseline update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add performance-trend.csv
          git diff --cached --quiet || git commit -m "perf: update gate performance baseline"
          git push

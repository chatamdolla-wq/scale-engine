<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCALE Engine Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: oklch(15% 0.01 270);
      color: oklch(90% 0.01 270);
      padding: 2rem;
    }
    h1 { font-size: 2rem; margin-bottom: 1rem; color: oklch(70% 0.15 250); }
    .section {
      background: oklch(20% 0.01 270);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .section h2 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .artifact-node {
      padding: 0.5rem;
      border-left: 2px solid oklch(70% 0.15 250);
      margin-left: 1rem;
    }
    .artifact-node.root { margin-left: 0; }
    .status { padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; }
    .status-DRAFT { background: oklch(60% 0.15 50); color: oklch(95% 0.01 50); }
    .status-REVIEWING { background: oklch(60% 0.15 80); color: oklch(95% 0.01 80); }
    .status-FROZEN { background: oklch(60% 0.15 250); color: oklch(95% 0.01 250); }
    .status-COMPLETED { background: oklch(60% 0.15 150); color: oklch(95% 0.01 150); }
    .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .metric-card {
      background: oklch(25% 0.01 270);
      padding: 1rem;
      border-radius: 0.5rem;
      text-align: center;
    }
    .metric-value { font-size: 2rem; color: oklch(70% 0.15 250); }
    .metric-label { font-size: 0.75rem; color: oklch(60% 0.01 270); }
    .event-list { max-height: 200px; overflow-y: auto; }
    .event-item { padding: 0.5rem; border-bottom: 1px solid oklch(30% 0.01 270); }
    .event-type { color: oklch(70% 0.15 250); }
    .loading { color: oklch(50% 0.01 270); }
    .severity-low { background: oklch(60% 0.15 150); color: oklch(95% 0.01 150); }
    .severity-medium { background: oklch(60% 0.15 80); color: oklch(95% 0.01 80); }
    .severity-high { background: oklch(60% 0.15 50); color: oklch(95% 0.01 50); }
    .severity-critical { background: oklch(50% 0.2 25); color: oklch(95% 0.01 25); }
    .root-cause-tag { padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; margin: 0.25rem; display: inline-block; }
    .defect-list { max-height: 300px; overflow-y: auto; }
    .defect-item { padding: 0.75rem; border-bottom: 1px solid oklch(30% 0.01 270); }
    .defect-title { font-weight: 600; }
    .defect-meta { font-size: 0.75rem; color: oklch(60% 0.01 270); }
    .count-bar { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
    .count-bar-fill { height: 1rem; border-radius: 0.25rem; }
    .actions { display: flex; gap: 0.25rem; margin-top: 0.25rem; flex-wrap: wrap; }
    .btn {
      padding: 0.2rem 0.5rem; border-radius: 0.25rem; border: none; cursor: pointer;
      font-size: 0.7rem; font-weight: 600; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-transition { background: oklch(55% 0.15 250); color: oklch(95% 0.01 250); }
    .btn-approve { background: oklch(55% 0.15 150); color: oklch(95% 0.01 150); }
    .btn-reject { background: oklch(55% 0.15 25); color: oklch(95% 0.01 25); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .toast {
      position: fixed; bottom: 1rem; right: 1rem; padding: 0.75rem 1.25rem;
      border-radius: 0.5rem; font-size: 0.85rem; z-index: 1000;
      animation: fadeInOut 3s ease-in-out;
    }
    .toast-success { background: oklch(40% 0.15 150); color: oklch(95% 0.01 150); }
    .toast-error { background: oklch(40% 0.15 25); color: oklch(95% 0.01 25); }
    @keyframes fadeInOut { 0%{opacity:0} 10%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
    .lesson-item { padding: 0.75rem; border-bottom: 1px solid oklch(30% 0.01 270); }
    .lesson-meta { font-size: 0.75rem; color: oklch(60% 0.01 270); margin-top: 0.25rem; }
  </style>
</head>
<body>
  <h1>SCALE Engine Dashboard</h1>
  <div id="content" class="loading">Loading...</div>
  <script>
    async function loadDashboard() {
      try {
        const res = await fetch('/api/state');
        const data = await res.json();
        renderDashboard(data);
        setInterval(async () => {
          const res = await fetch('/api/state');
          const data = await res.json();
          renderDashboard(data);
        }, 5000);
      } catch (e) {
        document.getElementById('content').innerHTML = '<p>Error loading dashboard: ' + e.message + '</p>';
      }
    }
    function renderArtifacts(nodes) {
      if (!nodes || nodes.length === 0) return '<p>No artifacts</p>';
      return nodes.map(n => renderArtifactNode(n, true)).join('');
    }
    function renderArtifactNode(n, isRoot) {
      const gateHtml = n.gates && n.gates.length > 0 ? `
        <div style="margin-top: 0.25rem; font-size: 0.7rem;">
          ${n.gates.map(g => `<span style="color: ${g.passed ? 'oklch(70% 0.15 150)' : g.required ? 'oklch(70% 0.15 25)' : 'oklch(60% 0.01 270)'}">${g.required ? (g.passed ? '✓' : '✗') : '·'} ${g.name}</span>`).join(' ')}
        </div>` : '';
      return `
        <div class="artifact-node ${isRoot ? 'root' : ''}">
          <strong>${n.id}</strong>: ${n.title}
          <span class="status status-${n.status}">${n.status}</span>
          ${gateHtml}
          <div class="actions">
            <button class="btn btn-transition" onclick="fetchActions('${n.id}', this)">Actions</button>
          </div>
          <div id="actions-${n.id}" style="display:none; margin-top: 0.25rem;"></div>
          ${n.children?.length > 0 ? n.children.map(c => renderArtifactNode(c, false)).join('') : ''}
        </div>
      `;
    }
    function renderDetectors(stats) {
      if (!stats || stats.length === 0) return '<p>No detector stats</p>';
      return '<ul>' + stats.map(s => `
        <li><strong>${s.name}</strong>: ${s.totalTriggers} triggers
          (warn: ${s.bySeverity.warn ?? 0}, block: ${s.bySeverity.block ?? 0})
        </li>
      `).join('') + '</ul>';
    }
    function renderEvents(events) {
      if (!events || events.length === 0) return '<p>No recent events</p>';
      return events.map(e => `
        <div class="event-item">
          <span class="event-type">${e.type}</span>
          <small>${new Date(e.timestamp).toLocaleTimeString()}</small>
        </div>
      `).join('');
    }
    function renderAutoDefects(stats) {
      if (!stats) return '<p>No AutoDefect data</p>';
      const rootCauseColors = {
        hallucination: 'oklch(60% 0.15 250)',
        ai_slop: 'oklch(60% 0.15 150)',
        duplicate_edit: 'oklch(60% 0.15 80)',
        brute_retry: 'oklch(60% 0.15 50)',
        blame_shift: 'oklch(60% 0.15 30)',
      };
      const rootCauses = Object.entries(stats.byRootCause);
      const severities = Object.entries(stats.bySeverity);
      return `
        <div class="metrics-grid">
          <div class="metric-card">
            <div class="metric-value">${stats.totalDefects}</div>
            <div class="metric-label">Total Defects</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${stats.autoCreatedCount}</div>
            <div class="metric-label">Auto-Created</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${rootCauses.length}</div>
            <div class="metric-label">Root Cause Types</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${severities.length}</div>
            <div class="metric-label">Severity Levels</div>
          </div>
        </div>
        <div style="margin-top: 1rem;">
          <h3 style="font-size: 1rem; margin-bottom: 0.5rem;">By Root Cause</h3>
          ${rootCauses.map(([cause, count]) => `
            <span class="root-cause-tag" style="background: ${rootCauseColors[cause] ?? 'oklch(50% 0.01 270)'}">
              ${cause}: ${count}
            </span>
          `).join('')}
        </div>
        <div style="margin-top: 1rem;">
          <h3 style="font-size: 1rem; margin-bottom: 0.5rem;">By Severity</h3>
          ${severities.map(([sev, count]) => `
            <span class="root-cause-tag severity-${sev}">
              ${sev}: ${count}
            </span>
          `).join('')}
        </div>
        <div style="margin-top: 1rem;">
          <h3 style="font-size: 1rem; margin-bottom: 0.5rem;">Recent AutoDefects</h3>
          <div class="defect-list">
            ${stats.recentDefects.length > 0 ? stats.recentDefects.map(d => `
              <div class="defect-item">
                <div class="defect-title">${d.title}</div>
                <div class="defect-meta">
                  <span class="status severity-${d.severity}">${d.severity}</span>
                  <span class="root-cause-tag" style="background: ${rootCauseColors[d.rootCause] ?? 'oklch(50% 0.01 270)'}">${d.rootCause}</span>
                  via ${d.detector} • ${new Date(d.createdAt).toLocaleString()}
                </div>
              </div>
            `).join('') : '<p>No recent defects</p>'}
          </div>
        </div>
      `;
    }
    // ── Interaction Functions ──────────────────────────────────────────

    function showToast(msg, isError) {
      const el = document.createElement('div');
      el.className = 'toast ' + (isError ? 'toast-error' : 'toast-success');
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    async function fetchActions(id, btn) {
      const container = document.getElementById('actions-' + id);
      if (container.style.display !== 'none') {
        container.style.display = 'none';
        return;
      }
      btn.disabled = true;
      try {
        const res = await fetch('/api/artifacts/' + id + '/actions');
        const data = await res.json();
        if (!res.ok || !data.actions || data.actions.length === 0) {
          container.innerHTML = '<span style="font-size:0.7rem; color:oklch(60% 0.01 270)">No available actions</span>';
        } else {
          container.innerHTML = data.actions.map(a =>
            '<button class="btn btn-transition" onclick="doTransition(\'' + id + '\', \'' + a + '\', this)">' + a + '</button>'
          ).join('');
        }
        container.style.display = 'block';
      } catch (e) {
        showToast('Failed to load actions: ' + e.message, true);
      } finally {
        btn.disabled = false;
      }
    }

    async function doTransition(id, action, btn) {
      btn.disabled = true;
      try {
        const res = await fetch('/api/artifacts/' + id + '/transition', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, reason: 'Dashboard: ' + action }),
        });
        const data = await res.json();
        if (res.ok && data.success) {
          showToast(action + ' succeeded for ' + id, false);
          loadDashboard();
        } else {
          const blocked = data.blockedBy?.map(b => b.guard + ': ' + b.message).join('; ') || data.error;
          showToast('Blocked: ' + blocked, true);
        }
      } catch (e) {
        showToast('Error: ' + e.message, true);
      } finally {
        btn.disabled = false;
      }
    }

    async function approveLesson(id, btn) {
      btn.disabled = true;
      try {
        const res = await fetch('/api/lessons/' + id + '/approve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reason: 'Approved via dashboard' }),
        });
        const data = await res.json();
        if (res.ok && data.success) {
          showToast('Lesson ' + id + ' approved', false);
          loadDashboard();
        } else {
          showToast('Failed: ' + (data.error || 'Unknown error'), true);
        }
      } catch (e) {
        showToast('Error: ' + e.message, true);
      } finally {
        btn.disabled = false;
      }
    }

    async function rejectLesson(id, btn) {
      btn.disabled = true;
      try {
        const res = await fetch('/api/lessons/' + id + '/reject', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reason: 'Rejected via dashboard' }),
        });
        const data = await res.json();
        if (res.ok && data.success) {
          showToast('Lesson ' + id + ' rejected', false);
          loadDashboard();
        } else {
          showToast('Failed: ' + (data.error || 'Unknown error'), true);
        }
      } catch (e) {
        showToast('Error: ' + e.message, true);
      } finally {
        btn.disabled = false;
      }
    }

    // ── Enhanced renderDashboard with Lessons ─────────────────────────

    function renderDashboard(data) {
      const lessons = data.artifacts.flatMap ? flattenArtifacts(data.artifacts).filter(a => a.type === 'Lesson') : [];
      const html = `
        <div class="section">
          <h2>Evolution Metrics</h2>
          <div class="metrics-grid">
            <div class="metric-card">
              <div class="metric-value">${data.evolutionMetrics?.overallScore?.toFixed(1) ?? 'N/A'}</div>
              <div class="metric-label">Overall Score</div>
            </div>
            <div class="metric-card">
              <div class="metric-value">${data.evolutionMetrics?.lessonMetrics?.count ?? 0}</div>
              <div class="metric-label">Lessons</div>
            </div>
            <div class="metric-card">
              <div class="metric-value">${data.evolutionMetrics?.ruleMetrics?.count ?? 0}</div>
              <div class="metric-label">Rules</div>
            </div>
            <div class="metric-card">
              <div class="metric-value">${data.detectorStats.length}</div>
              <div class="metric-label">Active Detectors</div>
            </div>
          </div>
        </div>
        <div class="section">
          <h2>Artifact Tree</h2>
          ${renderArtifacts(data.artifacts)}
        </div>
        ${lessons.length > 0 ? `
        <div class="section">
          <h2>Lessons</h2>
          ${lessons.map(l => `
            <div class="lesson-item">
              <strong>${l.id}</strong>: ${l.title}
              <span class="status status-${l.status}">${l.status}</span>
              ${l.status === 'PROPOSED' ? `
                <div class="actions" style="margin-top:0.5rem">
                  <button class="btn btn-approve" onclick="approveLesson('${l.id}', this)">Approve</button>
                  <button class="btn btn-reject" onclick="rejectLesson('${l.id}', this)">Reject</button>
                </div>
              ` : ''}
            </div>
          `).join('')}
        </div>` : ''}
        <div class="section">
          <h2>Detector Statistics</h2>
          ${renderDetectors(data.detectorStats)}
        </div>
        <div class="section">
          <h2>AutoDefect Statistics</h2>
          ${renderAutoDefects(data.autoDefectStats)}
        </div>
        <div class="section">
          <h2>Recent Events</h2>
          <div class="event-list">
            ${renderEvents(data.recentEvents)}
          </div>
        </div>
      `;
      document.getElementById('content').innerHTML = html;
    }

    function flattenArtifacts(nodes) {
      const result = [];
      for (const n of nodes) {
        result.push(n);
        if (n.children && n.children.length > 0) {
          result.push(...flattenArtifacts(n.children));
        }
      }
      return result;
    }

    loadDashboard();
  </script>
</body>
</html>
